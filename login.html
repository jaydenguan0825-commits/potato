
<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Potato - Login</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            background: linear-gradient(135deg, #0a0e27 0%, #141e3c 100%);
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Arial, sans-serif;
            min-height: 100vh;
            overflow: hidden;
        }

        @keyframes confetti-fall {
            0% {
                transform: translateY(0) rotate(0deg);
                opacity: 1;
            }
            100% {
                transform: translateY(100vh) rotate(720deg);
                opacity: 0;
            }
        }

        @keyframes float-up {
            0% {
                transform: translateY(0) scale(1);
                opacity: 0;
            }
            50% {
                opacity: 1;
            }
            100% {
                transform: translateY(-30px) scale(1.1);
                opacity: 0;
            }
        }

        .confetti {
            position: fixed;
            pointer-events: none;
            animation: confetti-fall 3s ease-in forwards;
        }

        .welcome-message {
            animation: float-up 3s ease-out forwards;
        }

        .glow {
            text-shadow: 0 0 10px #00ff88, 0 0 20px #00ff88;
        }

        .neon-border {
            border: 2px solid #00ff88;
            box-shadow: 0 0 20px rgba(0, 255, 136, 0.3), inset 0 0 10px rgba(0, 255, 136, 0.1);
        }

        input::placeholder {
            color: rgba(0, 255, 136, 0.5);
        }

        .submit-btn {
            position: relative;
            overflow: hidden;
        }

        .submit-btn::before {
            content: '';
            position: absolute;
            top: 0;
            left: -100%;
            width: 100%;
            height: 100%;
            background: linear-gradient(90deg, transparent, rgba(255, 255, 255, 0.3), transparent);
            transition: left 0.5s;
        }

        .submit-btn:hover::before {
            left: 100%;
        }
    </style>
</head>
<body class="flex items-center justify-center min-h-screen">
    <!-- Main container -->
    <div id="loginContainer" class="w-full max-w-md px-8">
        <!-- Login form -->
        <div id="loginForm" class="neon-border rounded-lg p-8 bg-gradient-to-br from-[#141e3c] to-[#1e3264]">
            <h1 class="text-4xl font-bold mb-4 glow" style="color: #00ff88;">LOGIN</h1>
            <p class="text-gray-300 mb-8 text-sm">So, u want to be a sweat, and make a new account? ok then...</p>

            <form id="loginFormElement" class="space-y-6">
                <!-- Username input -->
                <div>
                    <label class="block text-sm font-bold mb-2 glow" style="color: #00ff88;">Username:</label>
                    <input
                        id="username"
                        type="text"
                        placeholder="Enter your username"
                        class="neon-border w-full px-4 py-2 bg-[#0a0e27] rounded-lg focus:outline-none transition-all"
                        style="color: #00ff88;"
                        required
                    />
                </div>

                <!-- Password input -->
                <div>
                    <label class="block text-sm font-bold mb-2 glow" style="color: #00ff88;">Password:</label>
                    <input
                        id="password"
                        type="password"
                        placeholder="Enter your password"
                        class="neon-border w-full px-4 py-2 bg-[#0a0e27] rounded-lg focus:outline-none transition-all"
                        style="color: #00ff88;"
                        required
                    />
                </div>

                <!-- Submit button -->
                <button
                    type="submit"
                    class="submit-btn w-full py-3 mt-8 font-bold text-black rounded-lg transition-all transform hover:scale-105 active:scale-95"
                    style="background-color: #00ff88; box-shadow: 0 0 20px rgba(0, 255, 136, 0.5);"
                >
                    ENTER
                </button>
            </form>
            <p class="text-center text-sm text-gray-400 mt-4">
                Don't have an account? <a href="signup.html" class="text-[#00ff88] hover:text-[#b7ffcc]">Sign up</a>
            </p>
        </div>

        <!-- Footer -->
        <div class="fixed bottom-4 left-0 right-0 text-center">
            <p class="text-gray-500 text-xs" style="color: rgba(0, 255, 136, 0.4);">Ez productions <span style="font-size: 0.7em;">™</span></p>
        </div>
    </div>

    <script>
        document.getElementById('loginFormElement').addEventListener('submit', function (e) {
            e.preventDefault();
            window.location.href = 'index.html';
        });
    </script>
</body>
</html>
